<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Journey Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="services-section">
  <div class="services-container">

    <!-- HEADER -->
    <div class="services-header">
      <p class="services-eyebrow">Trusted digital solutions for your business</p>
      <h2 class="services-heading">Why choose Our Employee<br><span>Journey Services?</span></h2>
    </div>

    <!-- GRID -->
    <div class="services-grid">

      <!-- LEFT COLUMN -->
      <div class="services-col services-col-left">
        <!-- Row 1: Register -->
        <div class="service-row">
          <img src="images/icon-register.svg" alt="Register" class="service-icon">
          <span class="service-label">Register</span>
        </div>
        <!-- Row 2: CV Review -->
        <div class="service-row">
          <img src="images/icon-cv-review.svg" alt="CV Review" class="service-icon">
          <span class="service-label">CV Review</span>
        </div>
        <!-- Row 3: Job Matching (last) -->
        <div class="service-row last">
          <img src="images/icon-job-matching.svg" alt="Job Matching" class="service-icon">
          <span class="service-label">Job Matching</span>
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="services-col services-col-right">
        <!-- Row 1: Interview Preparation -->
        <div class="service-row">
          <img src="images/icon-interview-prep.svg" alt="Interview Preparation" class="service-icon">
          <span class="service-label">Interview Preparation</span>
        </div>
        <!-- Row 2: Placement -->
        <div class="service-row">
          <img src="images/icon-placement.svg" alt="Placement" class="service-icon">
          <span class="service-label">Placement</span>
        </div>
        <!-- Row 3: Career Support (last) -->
        <div class="service-row last">
          <img src="images/icon-career-support.svg" alt="Career Support" class="service-icon">
          <span class="service-label">Career Support</span>
        </div>
      </div>

    </div>

  </div>
</section>

</body>
</html>
